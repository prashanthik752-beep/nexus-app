<!DOCTYPE html>
<html>
<head>
<title>NEXUS - Fixed</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  margin:0;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

input,button{
  padding:10px;
  margin:5px;
}

/* APP */
#app{
  display:none;
  padding:20px;
}

/* AI PANEL */
#p-ai{
  margin-top:20px;
  padding:20px;
  border:1px solid #444;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter PIN</h2>
  <input id="pin" type="password" placeholder="1234"/>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <h2>Welcome to NEXUS</h2>

  <!-- AI PANEL -->
  <div id="p-ai">

    <h3>AI Assistant</h3>

    <!-- Name Feature -->
    <input id="ai-name-input" placeholder="Name your AI"/>
    <button onclick="saveAIName()">Save</button>

    <!-- Robot -->
    <div style="text-align:center; margin-top:20px;">
      <div style="font-size:80px;">🤖</div>
      <div id="ai-display-name">NEXUS</div>
    </div>

  </div>

</div>

<script>

// ================= LOGIN =================
function login(){
  const pin = document.getElementById("pin").value;

  if(pin === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Wrong PIN");
  }
}

// ================= AI NAME =================
let aiName = localStorage.getItem("aiName") || "NEXUS";

window.onload = function(){
  document.getElementById("ai-display-name").innerText = aiName;
};

function saveAIName(){
  const input = document.getElementById("ai-name-input").value;

  if(input.trim() === ""){
    alert("Enter name");
    return;
  }

  aiName = input;
  localStorage.setItem("aiName", aiName);

  document.getElementById("ai-display-name").innerText = aiName;

  alert("Saved: " + aiName);
}

</script>

</body>
</html>
