<!DOCTYPE html>
<html>
<head>
<title>NEXUS AI (Working)</title>

<style>
body {
  background:#0d0c0a;
  color:white;
  font-family:Arial;
  margin:0;
}

#login {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#app {
  display:none;
  padding:20px;
}

#ai {
  margin-top:20px;
  padding:20px;
  border:1px solid #444;
  text-align:center;
}

input,button {
  padding:10px;
  margin:5px;
}
</style>

</head>
<body>

<div id="login">
  <h2>Enter PIN</h2>
  <input id="pin" type="password" placeholder="1234">
  <button onclick="login()">Login</button>
</div>

<div id="app">

  <h2>Welcome to NEXUS</h2>

  <div id="ai">

    <h3>AI Assistant</h3>

    <input id="ai-name-input" placeholder="Name your AI">
    <button onclick="saveAIName()">Save</button>

    <div id="ai-display-name" style="font-size:18px;margin-top:10px;">
      NEXUS
    </div>

    <div id="robot" style="font-size:80px;margin-top:20px;">🤖</div>

    <div id="status" style="color:gray;">Idle</div>

    <input id="ai-input" placeholder="Ask something...">
    <button onclick="ask()">Send</button>

  </div>

</div>

<script>

// LOGIN
function login(){
  if(document.getElementById("pin").value === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Wrong PIN");
  }
}

// ENTER KEY SUPPORT
document.getElementById("ai-input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    ask();
  }
});

// AI NAME
let aiName = localStorage.getItem("aiName") || "NEXUS";

window.onload = () => {
  document.getElementById("ai-display-name").innerText = aiName;
};

function saveAIName(){
  let val = document.getElementById("ai-name-input").value;
  if(!val) return alert("Enter name");

  aiName = val;
  localStorage.setItem("aiName", aiName);

  document.getElementById("ai-display-name").innerText = aiName;

  speak("My name is " + aiName);
}

// ASK AI (FIXED)
async function ask(){
  let q = document.getElementById("ai-input").value;
  if(!q) return;

  setState("Thinking...", "🤔");

  try{
    // ✅ FIXED API (more reliable)
    let res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent("https://api.affiliateplus.xyz/api/chatbot?message="+q+"&owner=You&botname="+aiName)}`);

    let data = await res.json();

    let txt = data.message || "Sorry, I couldn't respond.";

    setState("Speaking...", "🗣️");

    speak(txt);

  }catch(e){
    console.error(e);
    alert("AI failed");
    setState("Idle", "🤖");
  }
}

// SPEAK
function speak(text){
  let s = new SpeechSynthesisUtterance(text);

  s.onend = () => {
    setState("Idle", "🤖");
  };

  speechSynthesis.speak(s);
}

// STATE
function setState(t,emoji){
  document.getElementById("status").innerText = t;
  document.getElementById("robot").innerText = emoji;
}

</script>

</body>
</html>
